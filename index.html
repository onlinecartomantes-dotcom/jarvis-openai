<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S.</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020b14;
color:#00ffff;
height:100vh;
overflow:hidden;
}

.bg{
position:fixed;
inset:0;
overflow:hidden;

background:
url("https://i.ibb.co/xK16178m/Chat-GPT-Image-14-06-2026-21-54-59.png")
center center / cover no-repeat;
}

.bg::before{
content:"";
position:absolute;
inset:0;

background:
radial-gradient(
circle at center,
rgba(0,255,255,.15),
transparent 50%
);
}
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

display:flex;
flex-direction:column;
align-items:center;

text-align:center;
}

.arc{
width:min(75vw,320px);
height:min(75vw,320px);

position:relative;
cursor:pointer;

border-radius:50%;
overflow:hidden;

background:
radial-gradient(
circle at 35% 25%,
rgba(255,255,255,.35),
transparent 30%
),
url("https://i.ibb.co/BHdM06dh/Chat-GPT-Image-14-06-2026-22-41-05-removebg-preview.png");


background-size:160%;
background-position:center;
background-repeat:no-repeat;

box-shadow:
0 0 20px #00ffff,
0 0 60px #00ffff,
0 0 120px rgba(0,255,255,.5);

animation:
floatOrb 6s ease-in-out infinite;
}

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);
}
}

@keyframes spinReverse{
from{
transform:rotate(360deg);
}
to{
transform:rotate(0deg);
}
}

@keyframes floatOrb{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0px);
}
}
.title{
margin-top:35px;

font-size:clamp(32px,5vw,72px);

letter-spacing:12px;

color:#6ffcff;

text-shadow:
0 0 10px cyan,
0 0 25px cyan,
0 0 60px cyan;
}

.listening{

animation:
floatOrb 3s ease-in-out infinite;

box-shadow:
0 0 30px #00ffff,
0 0 80px #00ffff,
0 0 150px #00ffff,
0 0 250px rgba(0,255,255,.7);
}

@keyframes pulse{

0%{
box-shadow:
0 0 20px cyan,
0 0 40px cyan;
}

50%{
box-shadow:
0 0 40px cyan,
0 0 80px cyan,
0 0 120px cyan;
}

100%{
box-shadow:
0 0 20px cyan,
0 0 40px cyan;
}

}
#status{
margin-top:20px;
width:100%;

display:flex;
justify-content:center;
align-items:center;

text-align:center;

font-size:18px;
color:#76ffff;
letter-spacing:4px;

text-shadow:
0 0 10px cyan,
0 0 20px cyan;
}
@media (max-width:768px){

.title{
font-size:28px;
letter-spacing:4px;
}

#status{
font-size:15px;
}

}

@media (max-width:480px){

.title{
font-size:22px;
letter-spacing:3px;
}

#status{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="center">

<div
class="arc"
id="jarvisCircle"
onclick="toggleAssistant()">

</div>

<div class="title">
LÚMEN
</div>

<div class="subtitle">

</div>

<div id="status">
TOQUE NA ESFERA PARA INICIAR
</div>

</div>

<script>

const API_URL =
"https://jarvis-openai-du7j.onrender.com/api/chat";

let recognition;
let listening = false;
let speaking = false;
let initialized = false;

const circle =
document.getElementById(
"jarvisCircle"
);

const statusText =
document.getElementById(
"status"
);

function toggleAssistant(){

if(!initialized){

initialized = true;

startJarvis();

return;

}

if(listening){

pauseJarvis();

}else{

listening = true;

statusText.innerText =
"OUVINDO...";

circle.classList.add(
"listening"
);

if(recognition){

try{

recognition.start();

}catch(e){}

}else{

startVoice();

}

}

}

async function startJarvis(){

listening = true;

statusText.innerText =
"LÚMEN ATIVO";

circle.classList.add(
"listening"
);

speak(
"Olá. Eu sou Lúmen. Em que posso ajudar?"
);

setTimeout(()=>{

startVoice();

},2000);

}

function pauseJarvis(){

listening = false;

speaking = false;

try{

speechSynthesis.cancel();

}catch(e){}

try{

if(recognition){

recognition.stop();

}

}catch(e){}

circle.classList.remove(
"listening"
);

statusText.innerText =
"PAUSADO";

}
function startVoice(){

if(recognition){
return;
}
const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

statusText.innerText =
"NAVEGADOR NÃO SUPORTA VOZ";

return;

}

recognition =
new SpeechRecognition();

recognition.lang = "pt-BR";

recognition.continuous = false;

recognition.interimResults = true;

recognition.start();

listening = true;

circle.classList.add(
"listening"
);

statusText.innerText =
"OUVINDO...";

recognition.onresult =
async function(event){

if(speaking) return;

const result =
event.results[
event.results.length - 1
];

if(!result.isFinal) return;

const text =
result[0].transcript.trim();

if(!text) return;

statusText.innerText =
"PENSANDO...";

await sendVoiceMessage(text);

};

recognition.onend =
function(){

if(
listening &&
!speaking
){

try{

recognition.start();

}catch(e){}

}

};

}

async function sendVoiceMessage(text){

try{

if(recognition){

try{

recognition.stop();

}catch(e){}

}

const response =
await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

if(!response.ok){

throw new Error(
"HTTP " + response.status
);

}

const data =
await response.json();

const resposta =
data.reply || "Não consegui responder.";

if (
resposta.toLowerCase().includes("whatsapp") ||
resposta.includes("85 98696-6786")
){
mostrarWhatsapp();
}

// Troca qualquer número de telefone por uma frase amigável
const respostaFalada = resposta.replace(
    /(\+?\d[\d\s()-]{7,}\d)/g,
    "o link do WhatsApp está disponível na tela"
);
speak(respostaFalada);

}catch(error){

console.error(error);

statusText.innerText =
"OUVINDO...";

if(listening){

try{

recognition.start();

}catch(e){}

}

}

}

function speak(text){

speechSynthesis.cancel();

const utterance =
new SpeechSynthesisUtterance(
text
);

utterance.lang =
"pt-BR";

utterance.rate =
1.05;

utterance.pitch =
1.0;

const voices =
speechSynthesis.getVoices();

const voice =
voices.find(v =>
v.name.includes("Google")
&& v.lang.includes("pt")
)
||
voices.find(v =>
v.lang.includes("pt")
);

if(voice){

utterance.voice =
voice;

}

utterance.onstart =
function(){
if(recognition){

try{

recognition.stop();

}catch(e){}

}

speaking = true;

statusText.innerText =
"RESPONDENDO...";

};

utterance.onend =
function(){

speaking = false;

if(listening){

statusText.innerText =
"OUVINDO...";

setTimeout(()=>{

if(listening){

try{

recognition.start();

}catch(e){}

}

},500);

}

};

utterance.onerror =
function(error){

console.error(
"Erro na voz:",
error
);

speaking = false;

statusText.innerText =
"OUVINDO...";

};

speechSynthesis.speak(
utterance
);

}
function mostrarWhatsapp(){

const box =
document.getElementById(
"whatsappBox"
);

box.style.display = "block";

}
</script>
<div
id="whatsappBox"
style="
display:none;
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
z-index:9999;
">

<a
href="https://wa.me/5585986966786"
target="_blank"
style="
display:flex;
align-items:center;
gap:10px;
background:#25D366;
color:white;
padding:14px 20px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 20px rgba(37,211,102,.5);
">

<img
src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
width="30">

Falar no WhatsApp

</a>

</div>
</body>
</html>
