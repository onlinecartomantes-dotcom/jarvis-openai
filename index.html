<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S.</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020b14;
color:#00ffff;
height:100vh;
overflow:hidden;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at center,
rgba(0,255,255,.15),
transparent 40%);
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
pointer-events:auto;
}
.arc{
width:280px;
height:280px;
border:4px solid cyan;
border-radius:50%;
position:relative;
animation:spin 12s linear infinite;
box-shadow:0 0 30px cyan;
}

.arc::before{
content:"";
position:absolute;
inset:20px;
border:2px dashed cyan;
border-radius:50%;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}
.title{
margin-top:20px;
font-size:42px;
letter-spacing:8px;
}

.arc{
width:min(70vw,320px);
height:min(70vw,320px);
border:4px solid cyan;
border-radius:50%;
position:relative;
animation:spin 12s linear infinite;
box-shadow:0 0 30px cyan;
}

.listening{
animation:
spin 4s linear infinite,
pulse 1s ease-in-out infinite;
}

@keyframes pulse{

0%{
box-shadow:
0 0 20px cyan,
0 0 40px cyan;
}

50%{
box-shadow:
0 0 40px cyan,
0 0 80px cyan,
0 0 120px cyan;
}

100%{
box-shadow:
0 0 20px cyan,
0 0 40px cyan;
}

}

#status{
margin-top:20px;
font-size:18px;
color:#7fffff;
text-align:center;
letter-spacing:2px;
padding:0 20px;
max-width:90vw;
}

@media (max-width:768px){

.title{
font-size:28px;
letter-spacing:4px;
}

#status{
font-size:15px;
}

}

@media (max-width:480px){

.title{
font-size:22px;
letter-spacing:3px;
}

#status{
font-size:14px;
}

}
</style>
</head>

<body>

<div class="bg"></div>

<div class="center">

<div class="arc" id="jarvisCircle"></div>

<div class="title">
LÚMEN
</div>
<div id="status">
TOQUE EM QUALQUER LUGAR PARA INICIAR
</div>

</div>
<script>

const API_URL =
"https://jarvis-openai-du7j.onrender.com/api/chat";

let recognition;
let listening = false;
let speaking = false;

const circle =
document.getElementById("jarvisCircle");

const statusText =
document.getElementById("status");

document.body.addEventListener("click",()=>{

if(!listening){

startJarvis();

}else{

pauseJarvis();

}

});

async function startJarvis(){

listening = true;

statusText.innerText =
"LUMEN ATIVO";

circle.classList.add(
"listening"
);

speak(
"Olá. Eu sou Lúmen. Em que posso ajudar?"
);

setTimeout(()=>{

startVoice();

},2500);

}

function pauseJarvis(){

listening = false;

speaking = false;

try{

speechSynthesis.cancel();

}catch(e){}

try{

if(recognition){

recognition.stop();

}

}catch(e){}

circle.classList.remove(
"listening"
);

statusText.innerText =
"PAUSADO";

}

function startVoice(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

statusText.innerText =
"NAVEGADOR NÃO SUPORTA VOZ";

return;

}

recognition =
new SpeechRecognition();

recognition.lang = "pt-BR";

recognition.continuous = true;

recognition.interimResults = true;

recognition.start();

listening = true;

circle.classList.add(
"listening"
);

statusText.innerText =
"OUVINDO...";

recognition.onresult =
async function(event){

const result =
event.results[
event.results.length - 1
];

if(!result.isFinal) return;

const text =
result[0].transcript;

console.log(text);

statusText.innerText =
"PENSANDO...";

await sendVoiceMessage(text);

};

recognition.onend =
function(){

if(
listening &&
!speaking
){

try{

recognition.start();

}catch(e){}

}

};

}

async function sendVoiceMessage(text){

try{

const response =
await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

if(!response.ok){

throw new Error(
"Erro HTTP: " +
response.status
);

}

const data =
await response.json();

const resposta =
data.reply ||
"Sem resposta.";

statusText.innerText =
"RESPONDENDO...";

speaking = true;

if(recognition){

try{

recognition.stop();

}catch(e){}

}

setTimeout(()=>{

speak(resposta);

},200);

}catch(error){

console.error(
"ERRO:",
error
);

statusText.innerText =
"ERRO DE CONEXÃO";

speak(
"Desculpe. Estou com problemas de conexão."
);

}

}

function speak(text){

speechSynthesis.cancel();

const utterance =
new SpeechSynthesisUtterance(
text
);

utterance.lang =
"pt-BR";

utterance.rate =
1.12;

utterance.pitch =
0.95;

const voices =
speechSynthesis.getVoices();

const voice =
voices.find(v =>
v.name.includes("Google")
&& v.lang.includes("pt")
)
||
voices.find(v =>
v.lang.includes("pt")
);

if(voice){

utterance.voice =
voice;

}

utterance.onstart =
function(){

speaking = true;

statusText.innerText =
"RESPONDENDO...";

};

utterance.onend =
function(){

speaking = false;

if(listening){

statusText.innerText =
"OUVINDO...";

if(recognition){

try{

recognition.start();

}catch(e){}

}

}

};

utterance.onerror =
function(error){

console.error(
"Erro na voz:",
error
);

speaking = false;

statusText.innerText =
"ERRO DE ÁUDIO";

};

speechSynthesis.speak(
utterance
);

}

</script>

</body>
</html>
